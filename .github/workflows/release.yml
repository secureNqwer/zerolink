name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            os: linux
            arch: amd64
            ext: ""
            cgo: true
          - name: windows-amd64
            os: windows
            arch: amd64
            ext: ".exe"
            cgo: true
          - name: linux-arm64
            os: linux
            arch: arm64
            ext: ""
            cgo: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }

      - name: Install mingw
        if: matrix.os == 'windows'
        run: sudo apt-get install -y mingw-w64 cmake

      - name: Build libzt (Linux)
        if: matrix.cgo && matrix.os == 'linux'
        run: bash scripts/build_libzt.sh

      - name: Build libzt (Windows)
        if: matrix.cgo && matrix.os == 'windows'
        run: bash scripts/build_libzt.sh --windows

      - name: Build
        env:
          CGO_ENABLED: ${{ matrix.cgo && '1' || '0' }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.os == 'windows' && 'x86_64-w64-mingw32-gcc' || '' }}
          CXX: ${{ matrix.os == 'windows' && 'x86_64-w64-mingw32-g++' || '' }}
        run: |
          make client
          make server
          mkdir -p dist
          cp bin/zerolink dist/zerolink-${{ matrix.name }}${{ matrix.ext }}
          cp bin/zerolink-server dist/zerolink-server-${{ matrix.name }}${{ matrix.ext }}

      - name: Package libzt
        if: matrix.cgo
        run: |
          tar -czf dist/libzt-${{ matrix.name }}.tar.gz -C vendor zerotier/lib zerotier/include

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: true
