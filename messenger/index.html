<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zerolink</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg-dark: #0e1621;
  --bg-sidebar: #182533;
  --bg-active: #2b5278;
  --bg-hover: #202b36;
  --bg-msg-own: #8774e1;
  --bg-msg-other: #182533;
  --text-main: #f5f6f7;
  --text-sec: #7f91a4;
  --accent: #8774e1;
  --accent-hover: #7662d9;
  --border: #101921;
  --danger: #e53935;
  --success: #00e676;
}
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg-dark); color:var(--text-main); height:100vh; overflow:hidden; }
.hidden { display: none !important; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2b394a; border-radius:3px; }
.auth-container { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:var(--bg-dark); }
.auth-card { background:var(--bg-sidebar); border-radius:12px; padding:32px; width:100%; max-width:380px; }
.auth-card h1 { text-align:center; margin-bottom:24px; font-size:24px; }
.auth-card h1 span { color:var(--accent); }
.auth-card input, .auth-card select { width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; background:var(--bg-dark); color:var(--text-main); font-size:14px; font-family:inherit; }
.auth-card button { width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; font-weight:500; }
.auth-card button:hover { background:var(--accent-hover); }
.auth-card .error { color:var(--danger); text-align:center; margin-top:8px; font-size:13px; }
.auth-card .toggle { text-align:center; color:var(--text-sec); cursor:pointer; margin-top:12px; font-size:13px; }
.auth-card .toggle:hover { color:var(--text-main); }
.auth-card .log-area { margin-top:12px; padding:8px; background:var(--bg-dark); border-radius:6px; font-size:12px; color:var(--text-sec); max-height:150px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
.password-wrap { position:relative; }
.password-wrap input { padding-right:40px; }
.password-toggle { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; width:32px; height:32px; }
.password-toggle svg { width:20px; height:20px; fill:var(--text-sec); }
#app { display:flex; height:100vh; }
#sidebar { width:350px; min-width:350px; background:var(--bg-sidebar); display:flex; flex-direction:column; }
.header { height:54px; min-height:54px; padding:0 16px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:var(--bg-sidebar); }
#sidebar .header { justify-content:space-between; }
#main { flex:1; display:flex; flex-direction:column; min-width:0; }
#main .header { justify-content:space-between; background:var(--bg-dark); }
#messages { flex:1; overflow-y:auto; padding:12px 40px; display:flex; flex-direction:column; gap:6px; }
.msg { max-width:70%; padding:10px 16px; border-radius:12px; font-size:14px; line-height:1.4; word-break:break-word; position:relative; }
.msg.own { align-self:flex-end; background:var(--bg-msg-own); border-bottom-right-radius:4px; }
.msg.other { align-self:flex-start; background:var(--bg-msg-other); border-bottom-left-radius:4px; }
.msg .time { font-size:11px; color:var(--text-sec); margin-top:4px; text-align:right; }
.msg .name { font-size:12px; font-weight:500; margin-bottom:2px; color:var(--accent); }
#input-area { height:54px; min-height:54px; padding:0 40px; display:flex; align-items:center; gap:10px; border-top:1px solid var(--border); }
#input-area input { flex:1; padding:10px 14px; border:none; border-radius:8px; background:var(--bg-sidebar); color:var(--text-main); font-size:14px; outline:none; font-family:inherit; }
#input-area button, #input-area label { width:40px; height:40px; min-width:40px; border:none; border-radius:8px; background:var(--accent); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
#input-area button svg, #input-area label svg { width:20px; height:20px; fill:#fff; }
#input-area button:disabled { opacity:0.4; cursor:default; }
#input-area input:disabled { opacity:0.4; }
#peers-panel { width:300px; min-width:300px; background:var(--bg-sidebar); display:flex; flex-direction:column; border-left:1px solid var(--border); }
#peers-panel .header { border-bottom:1px solid var(--border); }
#peer-list { flex:1; overflow-y:auto; padding:8px; }
.peer-item { padding:10px 12px; margin:2px 0; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:12px; font-size:14px; }
.peer-item:hover { background:var(--bg-hover); }
.peer-item .avatar-wrap { position:relative; width:40px; height:40px; flex-shrink:0; }
.peer-item .avatar-wrap .online-ring { position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg-sidebar); }
.peer-item .avatar-wrap .online-ring.online { background:var(--success); }
.peer-item .info { flex:1; min-width:0; }
.peer-item .info .name { font-weight:500; }
.peer-item .info .sub { font-size:12px; color:var(--text-sec); }
.chat-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:16px; color:#fff; flex-shrink:0; position:relative; }
.chat-avatar-wrap { position:relative; width:40px; height:40px; flex-shrink:0; }
.chat-avatar-wrap .online-ring { position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg-sidebar); z-index:1; }
.chat-avatar-wrap .online-ring.online { background:var(--success); }
.chat-avatar-large { width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:32px; color:#fff; margin:0 auto 12px; }
.chat-list { flex:1; overflow-y:auto; padding:8px; }
.chat-item { padding:10px 12px; margin:2px 0; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:12px; }
.chat-item:hover { background:var(--bg-hover); }
.chat-item.active { background:var(--bg-active); }
.chat-item .info { flex:1; min-width:0; }
.chat-item .info .name { font-weight:500; font-size:14px; }
.chat-item .info .sub { font-size:12px; color:var(--text-sec); }
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; }
.settings-modal { background:var(--bg-sidebar); border-radius:12px; padding:32px; width:90%; max-width:420px; max-height:80vh; overflow-y:auto; }
.settings-modal h3 { text-align:center; margin-bottom:20px; font-size:20px; }
.settings-group { margin-bottom:16px; }
.settings-group label { display:block; font-size:12px; color:var(--text-sec); margin-bottom:4px; }
.settings-group input, .settings-group select { width:100%; padding:10px 12px; border:none; border-radius:8px; background:var(--bg-dark); color:var(--text-main); font-size:14px; font-family:inherit; }
.settings-group .read-only-val { display:block; padding:10px 12px; background:var(--bg-dark); border-radius:8px; font-size:14px; color:var(--text-sec); }
.settings-actions { display:flex; gap:10px; margin-top:20px; }
.settings-actions button { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; font-family:inherit; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-cancel { background:var(--bg-dark); color:var(--text-main); }
.btn-cancel:hover { background:var(--bg-hover); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { opacity:0.9; }
.settings-list { list-style:none; }
.settings-list li { padding:14px 12px; cursor:pointer; border-radius:8px; display:flex; align-items:center; gap:12px; font-size:14px; }
.settings-list li:hover { background:var(--bg-hover); }
.settings-list li svg { width:22px; height:22px; fill:var(--accent); flex-shrink:0; }
.settings-back { margin-bottom:12px; }
.settings-back button { background:none; border:none; color:var(--accent); cursor:pointer; font-size:14px; font-family:inherit; display:flex; align-items:center; gap:4px; }
.search-wrapper { padding:8px; }
.search-wrapper input { width:100%; padding:8px 12px; border:none; border-radius:8px; background:var(--bg-dark); color:var(--text-main); font-size:13px; outline:none; font-family:inherit; }
.search-wrapper input::placeholder { color:var(--text-sec); }
.empty-state { text-align:center; color:var(--text-sec); padding:40px; font-size:14px; }
#attach-input { display:none; }
@media (max-width:768px) {
  #sidebar { width:100%; min-width:auto; }
  #peers-panel { display:none; }
  .msg { max-width:90%; }
  #messages { padding:12px 16px; }
  #input-area { padding:0 16px; }
}
</style>
</head>
<body>
<div id="connect-screen" class="auth-container">
  <div class="auth-card">
    <h1><span>Z</span>erolink</h1>
    <input id="server-addr" placeholder="IP сервера (например 192.168.1.100:8080)" value="127.0.0.1:8080">
    <div id="connect-log" class="log-area"></div>
    <button id="connect-btn">Подключиться к серверу</button>
  </div>
</div>

<div id="auth-screen" class="auth-container hidden">
  <div class="auth-card">
    <h1 id="auth-title">Войти</h1>
    <input id="auth-username" placeholder="Имя пользователя">
    <div class="password-wrap">
      <input id="auth-password" type="password" placeholder="Пароль">
      <button class="password-toggle" id="auth-pass-toggle" type="button">
        <svg viewBox="0 0 24 24"><path d="M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9M12,4.5C17,4.5 21.27,7.61 23,12C21.27,16.39 17,19.5 12,19.5C7,19.5 2.73,16.39 1,12C2.73,7.61 7,4.5 12,4.5M3.18,12C4.83,15.36 8.24,17.5 12,17.5C15.76,17.5 19.17,15.36 20.82,12C19.17,8.64 15.76,6.5 12,6.5C8.24,6.5 4.83,8.64 3.18,12Z"/></svg>
      </button>
    </div>
    <div id="auth-pass2-wrap" class="password-wrap hidden">
      <input id="auth-password2" type="password" placeholder="Повторите пароль">
      <button class="password-toggle" id="auth-pass2-toggle" type="button">
        <svg viewBox="0 0 24 24"><path d="M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9M12,4.5C17,4.5 21.27,7.61 23,12C21.27,16.39 17,19.5 12,19.5C7,19.5 2.73,16.39 1,12C2.73,7.61 7,4.5 12,4.5M3.18,12C4.83,15.36 8.24,17.5 12,17.5C15.76,17.5 19.17,15.36 20.82,12C19.17,8.64 15.76,6.5 12,6.5C8.24,6.5 4.83,8.64 3.18,12Z"/></svg>
      </button>
    </div>
    <input id="auth-nickname" class="hidden" placeholder="Никнейм (для регистрации)">
    <div id="auth-error" class="error"></div>
    <button id="auth-btn">Войти</button>
    <div class="toggle" id="auth-toggle">Нет аккаунта? Зарегистрироваться</div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar">
    <div class="header">
      <span style="font-weight:600;">Zerolink</span>
      <div style="display:flex;gap:6px;">
        <button onclick="togglePeers()" style="background:none;border:none;color:var(--text-sec);cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;" title="Пользователи">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor"><path d="M16,11C17.66,11 18.99,9.66 18.99,8C18.99,6.34 17.66,5 16,5C14.34,5 13,6.34 13,8C13,9.66 14.34,11 16,11M8,11C9.66,11 10.99,9.66 10.99,8C10.99,6.34 9.66,5 8,5C6.34,5 5,6.34 5,8C5,9.66 6.34,11 8,11M8,13C5.67,13 1,14.17 1,16.5V19H15V16.5C15,14.17 10.33,13 8,13M16,13C15.71,13 15.38,13.02 15.03,13.05C16.19,13.89 17,15.02 17,16.5V19H23V16.5C23,14.17 18.33,13 16,13Z"/></svg>
        </button>
        <button onclick="showSettings()" style="background:none;border:none;color:var(--text-sec);cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;" title="Настройки">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
        </button>
      </div>
    </div>
    <div class="search-wrapper"><input id="chat-search" placeholder="Поиск чатов..." oninput="filterChats()"></div>
    <div id="chat-list" class="chat-list"></div>
  </div>

  <div id="main">
    <div class="header">
      <span id="current-chat-name" style="font-weight:500;">Выберите чат</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <label for="attach-input" id="attach-btn" title="Прикрепить файл">
        <svg viewBox="0 0 24 24"><path d="M16.5,6V17.5A4,4 0 0,1 12.5,21.5A4,4 0 0,1 8.5,17.5V5A2.5,2.5 0 0,1 11,2.5A2.5,2.5 0 0,1 13.5,5V15.5A1,1 0 0,1 12.5,16.5A1,1 0 0,1 11.5,15.5V6H10V15.5A2.5,2.5 0 0,0 12.5,18A2.5,2.5 0 0,0 15,15.5V5A4,4 0 0,0 11,1A4,4 0 0,0 7,5V17.5A5.5,5.5 0 0,0 12.5,23A5.5,5.5 0 0,0 18,17.5V6H16.5Z"/></svg>
      </label>
      <input id="attach-input" type="file" onchange="sendFile(event)">
      <input id="msg-input" placeholder="Написать сообщение..." disabled>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
      </button>
    </div>
  </div>

  <div id="peers-panel" class="hidden">
    <div class="header"><span style="font-weight:500;">Пользователи</span></div>
    <div class="search-wrapper"><input id="peer-search" placeholder="Поиск..." oninput="filterPeers()"></div>
    <div id="peer-list"></div>
  </div>
</div>

<!-- SETTINGS MODAL (multi-level like Telegram) -->
<div id="settings-modal" class="modal-overlay hidden">
  <div class="settings-modal">
    <div id="settings-level-0">
      <h3>Настройки</h3>
      <ul class="settings-list">
        <li onclick="settingsLevel(1)">
          <svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
          Профиль
        </li>
        <li onclick="settingsLevel(2)">
          <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
          Доставка
        </li>
        <li onclick="doLogout()" style="color:var(--danger);">
          <svg viewBox="0 0 24 24" style="fill:var(--danger);"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z"/></svg>
          Выйти
        </li>
      </ul>
    </div>

    <div id="settings-level-1" class="hidden">
      <div class="settings-back"><button onclick="settingsLevel(0)">&larr; Назад</button></div>
      <h3>Профиль</h3>
      <div id="settings-avatar-preview" class="chat-avatar-large"></div>
      <div class="settings-group"><label>Имя пользователя</label><span id="settings-username" class="read-only-val">@</span></div>
      <div class="settings-group"><label>Никнейм</label><input id="settings-nickname" placeholder="Отображаемое имя"></div>
      <div class="settings-group"><label>О себе</label><input id="settings-bio" placeholder="Статус / описание"></div>
      <div class="settings-group"><label>Аватар (вставьте ссылку или выберите файл)</label><input id="settings-avatar" placeholder="URL аватара"></div>
      <div class="settings-actions">
        <button class="btn-cancel" onclick="closeSettings()">Отмена</button>
        <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
      </div>
    </div>

    <div id="settings-level-2" class="hidden">
      <div class="settings-back"><button onclick="settingsLevel(0)">&larr; Назад</button></div>
      <h3>Доставка сообщений</h3>
      <div class="settings-group"><label>Режим</label>
        <select id="transport-select">
          <option value="both">Смешанный (P2P + сервер)</option>
          <option value="p2p">Только P2P</option>
          <option value="server">Только через сервер</option>
        </select>
      </div>
      <div style="font-size:12px;color:var(--text-sec);margin-top:8px;">P2P — напрямую через ZeroTier. Сервер — через relay.</div>
    </div>
  </div>
</div>

<script>
let ws, token, username, localNodeID, currentChat;
let chats = {}, peers = [], allPeers = [];
let isRegister = false;
let settingsLevelStack = [0];

function showScreen(id) { document.querySelectorAll('[id$="-screen"],[id="app"]').forEach(e=>e.classList.add('hidden')); const el = document.getElementById(id); if (el) el.classList.remove('hidden'); }
function log(msg) { const el = document.getElementById('connect-log'); if (el) el.textContent += msg + '\n'; }
function htmlEscape(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function avatarStyle(name) {
  if (!name || name.trim() === '') return '<div class="chat-avatar" style="background:#2b5278;">?</div>';
  const colors = ['#8774e1','#e53935','#43a047','#fb8c00','#1e88e5','#00acc1','#8e24aa','#6d4c41','#546e7a','#f4511e'];
  let hash = 0; for (let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  const color = colors[Math.abs(hash) % colors.length];
  const initial = name.trim().charAt(0).toUpperCase();
  return '<div class="chat-avatar" style="background:'+color+';">'+initial+'</div>';
}
function avatarLarge(name) {
  if (!name || name.trim() === '') return '<div class="chat-avatar-large" style="background:#2b5278;">?</div>';
  const colors = ['#8774e1','#e53935','#43a047','#fb8c00','#1e88e5','#00acc1','#8e24aa','#6d4c41','#546e7a','#f4511e'];
  let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash);
  const color=colors[Math.abs(hash)%colors.length];
  const initial=name.trim().charAt(0).toUpperCase();
  return '<div class="chat-avatar-large" style="background:'+color+';">'+initial+'</div>';
}
function avatarWithRing(name, online) {
  const ring = online ? '<div class="online-ring online"></div>' : '';
  if (!name || name.trim()==='') return '<div class="chat-avatar-wrap"><div class="chat-avatar" style="background:#2b5278;">?</div>'+ring+'</div>';
  const colors=['#8774e1','#e53935','#43a047','#fb8c00','#1e88e5','#00acc1','#8e24aa','#6d4c41','#546e7a','#f4511e'];
  let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash);
  const color=colors[Math.abs(hash)%colors.length];
  const initial=name.trim().charAt(0).toUpperCase();
  return '<div class="chat-avatar-wrap"><div class="chat-avatar" style="background:'+color+';">'+initial+'</div>'+ring+'</div>';
}

// Connect screen
document.getElementById('connect-btn').onclick = async () => {
  const s = document.getElementById('server-addr').value.trim();
  if (!s) return log('Укажите адрес сервера');
  log('Подключение к ' + s + '...');
  try {
    const r = await fetch('/api/server/connect', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({server:s})});
    const d = await r.json();
    if (d.ok === 'true') { log('Подключено!'); showScreen('auth'); }
    else log('Ошибка: ' + (d.error || 'неизвестная'));
  } catch(e) { log('Ошибка подключения: ' + e.message); }
};

// Auth screen
document.getElementById('auth-toggle').onclick = () => {
  isRegister = !isRegister;
  document.getElementById('auth-title').textContent = isRegister ? 'Регистрация' : 'Войти';
  document.getElementById('auth-btn').textContent = isRegister ? 'Зарегистрироваться' : 'Войти';
  document.getElementById('auth-toggle').textContent = isRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
  document.getElementById('auth-nickname').classList.toggle('hidden', !isRegister);
  document.getElementById('auth-pass2-wrap').classList.toggle('hidden', !isRegister);
};
document.getElementById('auth-pass-toggle').onclick = () => togglePassword('auth-password', 'auth-pass-toggle');
document.getElementById('auth-pass2-toggle').onclick = () => togglePassword('auth-password2', 'auth-pass2-toggle');

    : '<svg viewBox="0 0 24 24"><path d="M2,5.27L3.28,4L20,20.72L18.73,22L15.65,18.92C14.5,19.3 13.28,19.5 12,19.5C7,19.5 2.73,16.39 1,12C1.95,9.82 3.57,8 5.59,6.76L2,5.27M12,9A3,3 0 0,1 15,12C15,12.35 14.94,12.69 14.83,13L11,9.17C11.31,9.06 11.65,9 12,9M12,4.5C17,4.5 21.27,7.61 23,12C22.05,14.18 20.43,16 18.41,17.24L16,14.83C16.64,13.97 17,12.93 17,11.91V12C17,9.24 14.76,7 12,7C10.98,7 9.94,7.36 9.09,8L6.67,5.59C8.32,4.88 10.14,4.5 12,4.5Z"/></svg>';
}

document.getElementById('auth-btn').onclick = async () => {
  const s = document.getElementById('server-addr').value.trim();
  const u = document.getElementById('auth-username').value.trim();
  const p = document.getElementById('auth-password').value;
  const p2 = document.getElementById('auth-password2').value;
  const n = document.getElementById('auth-nickname').value.trim();
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!s || !u || !p) { errEl.textContent = 'Заполните все поля'; return; }
  if (isRegister && p !== p2) { errEl.textContent = 'Пароли не совпадают'; return; }

  try {
    let url = isRegister ? '/api/register' : '/api/login';
    let body = isRegister ? {server:s,username:u,password:p,nickname:n} : {server:s,username:u,password:p};
    const r = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d = await r.json();
    if (d.ok === 'true') {
      token = d.token; username = u;
      showScreen('app'); connectWS(); loadData();
    } else errEl.textContent = d.error || 'Ошибка';
  } catch(e) { errEl.textContent = 'Ошибка: ' + e.message; }
};

// WebSocket
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto+'//'+location.host+'/ws');
  ws.onopen = () => {};
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onmessage = e => {
    try {
      const evt = JSON.parse(e.data);
      if (evt.type === 'message.received' && currentChat) loadMessages();
      if (evt.type === 'message.sent' && currentChat) setTimeout(loadMessages, 300);
      if (evt.type === 'peer.online' || evt.type === 'peer.offline') loadPeers();
    } catch(ex) {}
  };
}

// Data loading
async function loadData() { await Promise.all([loadChats(), loadPeers()]); }

async function loadChats() {
  try {
    const r = await fetch('/api/chats'); const d = await r.json();
    if (!Array.isArray(d)) return;
    chats = {}; const el = document.getElementById('chat-list'); el.innerHTML = '';
    d.forEach(c => { chats[c.id] = c; });
    renderChats(d);
  } catch(e) {}
}

function renderChats(list) {
  const el = document.getElementById('chat-list'); el.innerHTML = '';
  const query = (document.getElementById('chat-search').value || '').toLowerCase();
  const filtered = list.filter(c => {
    const name = c.name || c.id || '';
    return name.toLowerCase().includes(query);
  });
  if (filtered.length === 0) { el.innerHTML = '<div class="empty-state">Нет чатов</div>'; return; }
  filtered.forEach(c => {
    const isDM = c.type === 0;
    const otherMember = isDM ? c.members.find(m => m.peer_id && m.peer_id.node_id !== localNodeID) : null;
    const displayName = isDM && otherMember ? (otherMember.peer_id.node_id || c.id).substring(0,8) : (c.name || c.id.substring(0,8));
    const div = document.createElement('div');
    div.className = 'chat-item' + (c.id === currentChat ? ' active' : '');
    div.innerHTML = avatarStyle(displayName) + '<div class="info"><div class="name">'+htmlEscape(displayName)+'</div></div>';
    div.onclick = () => { currentChat = c.id; loadMessages(); renderChats(list); document.getElementById('msg-input').disabled=false; document.getElementById('send-btn').disabled=false; document.getElementById('current-chat-name').textContent=displayName; };
    el.appendChild(div);
  });
}

async function loadMessages() {
  if (!currentChat) return;
  try {
    const r = await fetch('/api/messages?chat_id='+currentChat); const d = await r.json();
    if (!Array.isArray(d)) return;
    const el = document.getElementById('messages'); el.innerHTML = '';
    d.forEach(m => {
      const isOwn = m.sender_id && m.sender_id.node_id === localNodeID;
      const div = document.createElement('div');
      div.className = 'msg ' + (isOwn ? 'own' : 'other');
      if (!isOwn && m.sender_id) div.innerHTML = '<div class="name">'+htmlEscape(m.sender_id.node_id.substring(0,8))+'</div>';
      div.innerHTML += htmlEscape(m.payload || '') + '<div class="time">'+new Date(m.sent_at).toLocaleTimeString()+'</div>';
      el.appendChild(div);
    });
    el.scrollTop = el.scrollHeight;
  } catch(e) {}
}

async function loadPeers() {
  try {
    const r = await fetch('/api/peers'); const d = await r.json();
    if (!d.peers) return;
    allPeers = d.peers; filterPeers();
  } catch(e) {}
}

function filterPeers() {
  const query = (document.getElementById('peer-search').value || '').toLowerCase();
  const filtered = allPeers.filter(p => (p.username||'').toLowerCase().includes(query) || (p.nickname||'').toLowerCase().includes(query));
  const el = document.getElementById('peer-list'); el.innerHTML = '';
  if (filtered.length === 0) { el.innerHTML = '<div class="empty-state">Нет пользователей</div>'; return; }
  filtered.forEach(p => {
    const name = p.nickname || p.username;
    const div = document.createElement('div'); div.className = 'peer-item';
    div.innerHTML = avatarWithRing(name, p.online) + '<div class="info"><div class="name">'+htmlEscape(name)+'</div><div class="sub">@'+htmlEscape(p.username)+'</div></div>';
    div.onclick = () => startDM(p);
    el.appendChild(div);
  });
}

async function startDM(p) {
  try {
    const r = await fetch('/api/dm', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:p.node_id,fingerprint:p.fingerprint})});
    const d = await r.json();
    if (d.ok) {
      const chatId = d.chat_id || d.chat;
      // Check if we already have this chat
      const existing = Object.values(chats).find(c => {
        if (c.type !== 0) return false;
        return c.members && c.members.some(m => m.peer_id && m.peer_id.node_id === p.node_id);
      });
      currentChat = existing ? existing.id : chatId;
      await loadChats();
      await loadMessages();
      document.getElementById('msg-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('current-chat-name').textContent = p.nickname || p.username;
    }
  } catch(e) {}
}

// Send message
document.getElementById('send-btn').onclick = sendMsg;
document.getElementById('msg-input').onkeydown = e => { if (e.key==='Enter') sendMsg(); };
async function sendMsg() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !currentChat) return;
  inp.value = '';
  try {
    await fetch('/api/send', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:currentChat,text})});
    setTimeout(loadMessages, 200);
  } catch(e) {}
}

// Send file
async function sendFile(event) {
  const file = event.target.files[0];
  if (!file || !currentChat) return;
  const form = new FormData();
  form.append('file', file);
  form.append('chat_id', currentChat);
  form.append('name', file.name);
  try {
    await fetch('/api/upload', {method:'POST',body:form});
    setTimeout(loadMessages, 300);
  } catch(e) {}
  event.target.value = '';
}

// Settings
function togglePeers() { document.getElementById('peers-panel').classList.toggle('hidden'); }
function showSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
function settingsLevel(level) {
  document.querySelectorAll('#settings-modal [id^="settings-level-"]').forEach(e => e.classList.add('hidden'));
  const el = document.getElementById('settings-level-'+level);
  if (el) el.classList.remove('hidden');
  if (level === 1) {
    document.getElementById('settings-username').textContent = '@' + (username||'');
    if (localNodeID) document.getElementById('settings-username').textContent += ' ('+localNodeID+')';
    document.getElementById('settings-nickname').value = '';
    document.getElementById('settings-bio').value = '';
    document.getElementById('settings-avatar').value = '';
    document.getElementById('settings-avatar-preview').innerHTML = avatarLarge(username);
    // Load current profile
    fetch('/api/profile').then(r=>r.json()).then(p => {
      if (p) {
        if (p.display_name) document.getElementById('settings-nickname').value = p.display_name;
        if (p.status_text) document.getElementById('settings-bio').value = p.status_text;
        if (p.avatar_hash) document.getElementById('settings-avatar').value = p.avatar_hash;
      }
    }).catch(()=>{});
  }
  if (level === 2) {
    fetch('/api/settings').then(r=>r.json()).then(s => {
      if (s.transport_mode) document.getElementById('transport-select').value = s.transport_mode;
    }).catch(()=>{});
  }
}

async function saveProfile() {
  const nickname = document.getElementById('settings-nickname').value;
  const bio = document.getElementById('settings-bio').value;
  const avatar = document.getElementById('settings-avatar').value;
  await fetch('/api/profile/update', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname,bio,avatar})});
  document.getElementById('settings-avatar-preview').innerHTML = avatarLarge(nickname || username);
  closeSettings();
}

document.getElementById('transport-select').onchange = async e => {
  await fetch('/api/settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transport_mode:e.target.value})});
};

async function doLogout() {
  await fetch('/api/logout', {method:'POST'});
  closeSettings();
  location.reload();
}

// Init
window.onload = async () => {
  try {
    const res = await fetch('/api/auth/status');
    const d = await res.json();
    if (d.connected && d.authenticated) {
      token = d.token; username = d.username; localNodeID = d.node_id;
      showScreen('app'); connectWS(); loadData();
    } else if (d.connected) {
      showScreen('auth');
    } else {
      showScreen('connect');
    }
  } catch(err) { showScreen('connect'); }
};
</script>
